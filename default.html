<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result Not Available | Wisdom Foundation Schools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            text-align: center;
        }

        /* Large logo above card */
        .main-logo {
            margin-bottom: 30px;
        }

        .main-logo img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Card styling */
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px 30px;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* Small logo inside card */
        .small-logo {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .small-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 28px;
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .message {
            font-size: 16px;
            color: #7f8c8d;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn {
            background: linear-gradient(45deg, #008000, #006400);
            border: none;
            color: gold;
            padding: 18px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #95a5a6;
        }

        @media (max-width: 600px) {
            .card {
                padding: 30px 20px;
            }
            h1 {
                font-size: 24px;
            }
            .small-logo {
                width: 80px;
                height: 80px;
            }
            .main-logo img {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Centered large logo -->
        <div class="main-logo">
            <img src="img/Ctemplogo.png" alt="Wisdom Foundation Schools Logo">
        </div>

        <!-- Main card -->
        <div class="card">
            <div class="small-logo">
                <img src="img/Ctemplogo.png" alt="Wisdom Schools Logo">
            </div>
            <h1>Result Not Uploaded</h1>
            <div class="message">
                The result for the selected class, session, and term has not been uploaded yet.<br>
                Please check back later.
            </div>
            <button class="btn" onclick="window.location.href='index.html';">OK</button>
            <div class="footer">
                &copy; portal.wisdomfoundationschools.org
            </div>
        </div>
    </div>
</body>
</html>
