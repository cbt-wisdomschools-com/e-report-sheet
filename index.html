        // Handle form submission
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
           
            const username = document.getElementById('username').value.toLowerCase().trim();
            const password = document.getElementById('password').value.trim();
            const errorMessage = document.getElementById('errorMessage');
            const altCheck = document.getElementById('altLoginCheck');
           
            // Check if credentials match any user (case-insensitive username match)
            const matchedUser = users.find(user =>
                user.username.toLowerCase() === username && user.password === password
            );
           
            if (matchedUser) {
                // Check if user has paid
                if (matchedUser.paid === false) {
                    alert("⚠️ You have not paid your school fees. You are not allowed access to the report portal.\n\nPlease contact the school administration to regularize your payment.");
                    return; // Stop execution, don't redirect
                }
                
                // User has paid, proceed with login
                // Store user data in sessionStorage for the main page to use
                sessionStorage.setItem('loggedInUser', JSON.stringify(matchedUser));
                sessionStorage.setItem('username', matchedUser.username);
                sessionStorage.setItem('image', `img/${matchedUser.image}`); // Add img/ prefix
                
                console.log("✅ Login successful for paid user:", matchedUser.username);
                
                // Check if alt login checkbox is checked
                if (altCheck.checked) {
                    console.log("🔄 Running alternate validation...");
                    validateLoginComparison(username, password);
                } else {
                    // Redirect to the main page
                    window.location.href = 'dashboard.html';
                }
            } else {
                // Show error message
                errorMessage.style.display = 'block';
               
                // Clear password field
                document.getElementById('password').value = '';
            }
        });

        // =============================

        function validateLoginComparison(username, password) {
            if (!username || !password) {
                alert("Please enter both username and password.");

            const user = users.find(
                (u) => u.username.toLowerCase() === username.toLowerCase() && u.password === password
            );

                sessionStorage.setItem('image', `img/${user.image}`); // Add img/ prefix
