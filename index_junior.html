});

// 2. Block Print (Ctrl+P) and Save (Ctrl+S) globally
document.addEventListener('keydown', function (event) {
    if ((event.ctrlKey && event.key === 'p') || (event.ctrlKey && event.key === 's')) {
        event.preventDefault();
        alert("Printing and saving are disabled .");
        return false;
    }
});

// 3. Block developer tools (F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U)
document.addEventListener('keydown', function (e) {
    if (e.key === 'F12' ||
        (e.ctrlKey && e.shiftKey && e.key === 'I') ||
        (e.ctrlKey && e.shiftKey && e.key === 'J') ||
        (e.ctrlKey && e.key === 'u')) {
        e.preventDefault();
        alert("Developer tools are disabled during examination.");

});

            const radio = document.querySelector(`input[name="option"][value="${key}"]`);

                radio.checked = true;

// Get stored username from login (sessionStorage)
const loggedInUsername = sessionStorage.getItem('username') || 'Student';
const user = users.find(u => u.username.toLowerCase() === loggedInUsername.toLowerCase());

async function startExam() {
    const enteredPassword = document.getElementById('examPassword').value;
    const username = loggedInUsername;
    const cls = document.getElementById('classSelect').value;
    const session = document.getElementById('sessionSelect').value;
    const term = document.getElementById('termSelect').value;

    const matchedUser = users.find(u => u.username.toLowerCase() === username.toLowerCase());
    if (!matchedUser) {
        alert('User not found. Please log in again.');
        return;
    }
    if (enteredPassword !== matchedUser.password) {
        alert('Incorrect password. Please try again.');
        return;
    }

    sessionStorage.setItem('class', cls);
    sessionStorage.setItem('session', session);
    sessionStorage.setItem('term', term);

    const sanitizedUsername = username.replace(/[^a-zA-Z0-9]/g, '_');
    const sanitizedClass = cls.replace(/[^a-zA-Z0-9]/g, '_');
    const sanitizedTerm = term.replace(/[^a-zA-Z0-9]/g, '_');
    const sanitizedSession = session.replace(/[^a-zA-Z0-9]/g, '_');

    const filename = `${sanitizedUsername}_${sanitizedClass}_${sanitizedTerm}_${sanitizedSession}_result.html`;

    // Check if the result file exists
    try {
        const response = await fetch(filename, { method: 'HEAD' });
        if (response.ok) {
            // File exists – redirect
            window.location.href = filename;
        } else {
            // File not found – redirect to default page
            alert('Result for the selected class/session/term has not been uploaded yet.');
            window.location.href = 'default.html';
        }
    } catch (error) {
        // Network error or CORS – fallback to default page
        console.error('Error checking file existence:', error);
        alert('Unable to verify result. Redirecting to default page.');
        window.location.href = 'default.html';
    }
}
